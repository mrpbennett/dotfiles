prSections:
  - title: Open PRs
    filters: is:open
  - title: My PRs
    filters: is:open author:@me
  - title: Needs My Review
    filters: is:open review-requested:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
issuesSections:
  - title: Open Issues
    filters: is:open
  - title: My Issues
    filters: is:open author:@me
  - title: Assigned To Me
    filters: is:open assignee:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
notificationsSections:
  - title: All
    filters: ''
  - title: Created
    filters: reason:author
  - title: Participating
    filters: reason:participating
  - title: Mentioned
    filters: reason:mention
  - title: Review Requested
    filters: reason:review-requested
  - title: Assigned
    filters: reason:assign
  - title: Subscribed
    filters: reason:subscribed
  - title: Team Mentioned
    filters: reason:team-mention
repo:
  branchesRefetchIntervalSeconds: 30
  prsRefetchIntervalSeconds: 60
defaults:
  preview:
    open: false
    width: 0.70
  prsLimit: 20
  prApproveComment: LGTM
  issuesLimit: 20
  notificationsLimit: 20
  view: prs
  layout:
    prs:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 20
      author:
        width: 15
      authorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
      base:
        width: 15
        hidden: true
      lines:
        width: 15
    issues:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 15
      creator:
        width: 10
      creatorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
  refetchIntervalMinutes: 30
keybindings:
  universal:
    - key: ctrl+g
      name: lazygit
      command: >
        cd {{.RepoPath}} && lazygit

repoPaths: {}
theme:
  # catppuccin latte
  colors:
    text:
      primary: "#4c4f69"
      secondary: "#1e66f5"
      inverted: "#dce0e8"
      faint: "#5c5f77"
      warning: "#df8e1d"
      success: "#40a02b"
      error: "#d20f39"
    background:
      selected: "#ccd0da"
    border:
      primary: "#1e66f5"
      secondary: "#bcc0cc"
      faint: "#ccd0da"
  # catppuccin macchiato
  # colors:
  #   text:
  #     primary: "#cad3f5"
  #     secondary: "#8aadf4"
  #     inverted: "#181926"
  #     faint: "#b8c0e0"
  #     warning: "#eed49f"
  #     success: "#a6da95"
  #     error: "#ed8796"
  #   background:
  #     selected: "#363a4f"
  #   border:
  #     primary: "#8aadf4"
  #     secondary: "#494d64"
  #     faint: "#363a4f"
  ui:
    sectionsShowCount: true
    table:
      showSeparator: true
      compact: false
pager:
  diff: 'hunk pager --mode split --line-numbers'
confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
includeReadNotifications: true
