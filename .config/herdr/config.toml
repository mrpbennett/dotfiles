onboarding = false
agent_panel_sort = "priority"

[terminal]
default_shell = "zsh"
shell_mode = "auto"
new_cmd = "follow"

[theme]
auto_switch = true
name = "catppuccin-latte"
light_name = "catppuccin-latte"
dark_name = "catppuccin"

[ui]
show_agent_labels_on_pane_borders = true
sidebar_collapsed_mode = "hidden"        # completely hides the sidebar (<prefix> + b) to open - v0.7.3
confirm_close = false
pane_gaps = false

[ui.toast]
delivery = "herdr"

[ui.toast.herdr]
position = "top-right"

[ui.toast.clipboard]
enabled = true
position = "top-right"

[ui.sidebar.spaces]
row_gap = 1
rows = [["state_icon", "workspace"], ["branch", "git_status"]]

[ui.sidebar.agents]
row_gap = 1
rows = [["state_icon", "workspace"], ["tab", "agent"]]

###########################################
# an attempt to mirror my tmux key bindings
###########################################

[keys]
prefix = "ctrl+s" # leader

# navigating
goto = "prefix+g"

# panes
split_vertical = "prefix+|"       # split window right
split_horizontal = "prefix+minus" # split window bottom
close_pane = "prefix+x"           # kill a pane
toggle_sidebar = "prefix+b"       # toggle sidebar

focus_pane_left = "prefix+h"  # switch pane left
focus_pane_down = "prefix+j"  # switch pane down
focus_pane_up = "prefix+k"    # switch pane up
focus_pane_right = "prefix+l" # switch pane right

# tabs
new_tab = "prefix+t"           # new tab with <prefix>
rename_tab = "prefix+r"        # rename tab
resize_mode = "prefix+shift+r" # resize mode

# workspaces
new_workspace = "prefix+shift+n"
rename_workspace = "prefix+shift+w"
close_workspace = "prefix+shift+x"  # close workspace
navigate_workspace_up = "k"         # move up workspaces
navigate_workspace_down = "j"       # move down workspaces

# sessions
detach = "prefix+q" # detach from session

###########################################
# Open useful TUI apps right within Herdr
###########################################

# opens a floating pane
[[keys.command]]
key = "prefix+f"
type = "popup"
command = "exec \"${SHELL:-sh}\""
description = "open scratch terminal"
width = "80%"
height = "70%"

# open lazygit
[[keys.command]]
key = "prefix+shift+l"
type = "popup"
command = "lazygit"
description = "run lazygit"
width = "90%"
height = "90%"

# open hunk diff
[[keys.command]]
key = "prefix+shift+h"
type = "popup"
command = "hunk diff"
description = "show hunk diff"
width = "90%"
height = "90%"

# open k9s
[[keys.command]]
key = "prefix+shift+k"
type = "popup"
command = "k9s"
description = "Open k9s"
width = "90%"
height = "90%"

# open gh dash for pr reviews
[[keys.command]]
key = "prefix+shift+p"
type = "popup"
command = "gh dash"
description = "show gh dash to review PRs"
width = "90%"
height = "90%"

# open btop
[[keys.command]]
key = "prefix+shift+b"
type = "popup"
command = "btop"
description = "run btop"
width = "90%"
height = "90%"

# Override herdr's built-in "new worktree" key (prefix+shift+g) with worktrunk's
# default-branch switch/create picker:
[[keys.command]]
key = "prefix+shift+g"
type = "plugin_action"
command = "worktrunk.open"
description = "Worktree: switch / create from default branch"

# Optional: bind current-branch creation separately.
[[keys.command]]
key = "prefix+shift+c"
type = "plugin_action"
command = "worktrunk.open-current"
description = "Worktree: switch / create from current branch"

[[keys.command]]
key = "prefix+shift+d"
type = "plugin_action"
command = "worktrunk.remove"
description = "Worktree: remove"
